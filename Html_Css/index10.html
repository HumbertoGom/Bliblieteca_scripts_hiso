<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Razões para escolher Nabiki</title>
    <style>

        .section-one,.section-two {box-sizing: border-box;}

        .section-one {background :deeppink;
        width: 200px;
        height: 260px;
        
        padding: 0 30px;
        border-width: 10px;
        border-style: solid;
        border-top-color: blueviolet;
        border-left-color: rgb(75, 0, 59);
        border-right-color: rgb(75, 0, 59);
        border-bottom-color: purple;
        border-bottom-width: 10px;
        border-bottom-style: solid;
        margin:25px}

        .section-two {background :cyan;
            width: 200px;
            height: 200px;
        border: 5px solid black;
    padding: 10px;
    margin:25px 25 0 0;
    background-image: url(https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS6ZZCyc9SmN9_lychmtHMcQIMnmU8jKoGybg&s)}
        

    </style>
    <!-- Padding e Margin tem ordem de valores
      topo direita baixo e esquerda 
     essa é a ordem-->
     <!--
     Box sizing border box:
     padding passar a crescer para dentro
     não aumentando o tamanho
     -->
</head>
<body>
    <section class="section-one">
        Lorem ipsum dolor sit amet consectetur adipisicing elit. Sunt accusamus praesentium eius voluptate cumque cum numquam corrupti perferendis delectus. Nihil adipisci omnis corrupti provident quod quisquam porro, doloremque cum officia!
        <p style="color: blue;">Olha ficou bonito</p>

    </section>
    <section class="section-two">
      <b><p style="color:red">VOCÊ TEM UMA BELA ESPADA<br>
    ME DE SUA ESPADA</p></B>

    </section>
</body>
</html>
